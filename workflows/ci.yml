name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint & Type check ──────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - name: Typecheck API
        run: cd apps/api && npx tsc --noEmit
      - name: Typecheck Web
        run: cd apps/web && npx tsc --noEmit

  # ── Unit tests ─────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Run unit tests
        run: cd apps/api && npx jest --coverage --passWithNoTests
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: apps/api/coverage
          flags: unit-tests

  # ── E2E tests ──────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       bidflow_test
          POSTGRES_USER:     bidflow
          POSTGRES_PASSWORD: bidflow_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bidflow:bidflow_pass@localhost:5432/bidflow_test
      JWT_SECRET:   test-jwt-secret-for-ci-only-not-for-production
      NODE_ENV:     test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Run migrations
        run: cd packages/database && npx prisma migrate deploy
      - name: Seed test data
        run: npm run db:seed
      - name: Run E2E tests
        run: cd apps/api && npx jest --config test/jest-e2e.json --passWithNoTests

  # ── Build check ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Build API
        run: cd apps/api && npm run build
      - name: Build Web
        env:
          NEXT_PUBLIC_API_URL: https://api.bidflow.com/api/v1
        run: cd apps/web && npm run build
